<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市详情</title>
    <style>
        .container{max‑width:450px;margin:60px auto;background:#fff;padding:25px;border-radius:12px;}
        img{width:100%;border‑radius:8px;}
        .back{display:inline‑block;margin‑top:20px;padding:8px 14px;background:#666;color:#fff;text-decoration:none;}
    </style>
</head>
<body>
<div class="container">
    <img id="img">
    <h2 id="title"></h2>
    <p id="desc"></p>
    <a href="city_index.html" class="back">返回城市列表</a>
</div>

<script>
// 所有城市的数据，后期添加城市就在这里追加即可
const cityData = {
    beijing:{
        name:"北京",
        img:"https://p.686866.la/demo/beijing‑girl.jpg",//这里替换你的AI图片链接
        intro:"性格大方得体，开朗有趣，热爱旅行美食，待人温柔随和。"
    },
    shanghai:{
        name:"上海",
        img:"https://p.686866.la/demo/shanghai‑girl.jpg",
        intro:"精致独立，穿搭时尚，喜欢喝咖啡看展，性格温柔有主见。"
    },
    guangzhou:{
        name:"广州",
        img:"https://p.686866.la/demo/guangzhou‑girl.jpg",
        intro:"随和接地气，爱吃粤菜，为人爽快真诚，很好相处。"
    },
    shenzhen:{
        name:"深圳",
        img:"https://p.686866.la/demo/shenzhen‑girl.jpg",
        intro:"努力上进，热爱新鲜事物，时尚有活力。"
    },
    hangzhou:{
        name:"杭州",
        img:"https://p.686866.la/demo/hangzhou‑girl.jpg",
        intro:"温婉秀气，喜欢西湖风景，文静有涵养。"
    }
    xiamen:{
        name:"厦门",
        img:"https://p.686866.la/demo/xiamen‑girl.jpg",//这里替换你的AI图片链接
        intro:"性格大方得体，开朗有趣，热爱旅行美食，待人温柔随和。"
    },
    zhengzhou:{
        name:"郑州",
        img:"https://p.686866.la/demo/zhengzhou‑girl.jpg",
        intro:"精致独立，穿搭时尚，喜欢喝咖啡看展，性格温柔有主见。"
    },
    fuzhou:{
        name:"福州",
        img:"https://p.686866.la/demo/福州‑girl.jpg",
        intro:"随和接地气，爱吃粤菜，为人爽快真诚，很好相处。"
};
// 获取URL参数
function getUrlParam(name){
    let reg = new RegExp("(^|&)"+name+"=([^&]*)(&|$)");
    let result = window.location.search.substr(1).match(reg);
    if(result!=null) return decodeURI(result[2]);
    return null;
}
let cid = getUrlParam("city");
let info = cityData[cid];
if(!info){
    document.body.innerHTML = "<h3>该城市暂未收录</h3><a href='city_index.html'>返回</a>";
}else{
    document.getElementById("img").src = info.img;
    document.getElementById("title").innerText = info.name + "女生";
    document.getElementById("desc").innerText = info.intro;
}
</script>
</body>
</html>
